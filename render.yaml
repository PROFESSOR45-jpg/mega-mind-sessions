services:
  - type: web
    name: mega-mind-sessions
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: ADMIN_KEY
        generateValue: true
    disk:
      name: sessions
      mountPath: /opt/render/project/src/sessions
      sizeGB: 1
